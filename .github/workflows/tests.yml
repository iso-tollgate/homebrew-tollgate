name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit-formula:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Sync this checkout into the auto-tapped directory
        # setup-homebrew already clones the REAL iso-tollgate/tollgate tap
        # from GitHub automatically (visible in its own log output as
        # "Initialized empty Git repository in .../Taps/iso-tollgate/
        # homebrew-tollgate/.git/"), before this workflow does anything.
        # That's the tap `brew audit --strict iso-tollgate/tollgate/
        # iso-tollgate` will read from. Problem: it's a checkout of
        # whatever's on GitHub's default branch right now, NOT this PR's
        # changes. Calling `brew tap` ourselves to point at this checkout
        # instead hits a hard remote-mismatch error every time (commit
        # history) -- Homebrew enforces that a canonical user/repo tap name
        # can only ever resolve to its real GitHub remote, full stop, no
        # override. So: don't fight that. Just overwrite the auto-tapped
        # directory's files with this checkout's actual content, so the
        # already-correctly-registered tap reflects what we're testing.
        run: |
          TAP_DIR="$(brew --repository iso-tollgate/tollgate)"
          rsync -a --delete --exclude='.git' "$GITHUB_WORKSPACE"/ "$TAP_DIR"/

      - name: Audit formula syntax and style
        run: brew audit --strict iso-tollgate/tollgate/iso-tollgate
