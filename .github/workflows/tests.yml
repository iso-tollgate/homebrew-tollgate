name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit-formula:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap this repo locally (audit-only, no install)
        # `brew audit` no longer accepts a bare file path -- "Calling
        # `brew audit [path ...]` is disabled! Use `brew audit [name ...]`
        # instead." (hit 2026-06-21). Per Homebrew maintainer guidance
        # (github.com/orgs/Homebrew/discussions/4864), the fix is to tap
        # the repo and audit by its tap-qualified name. This is safe and
        # does NOT reintroduce the install-time tap collision from earlier
        # commits: `brew tap` alone never runs the formula's install method
        # or triggers dependency resolution, so there's nothing for a
        # second same-named tap to collide with.
        run: brew tap iso-tollgate/tollgate "$GITHUB_WORKSPACE"

      - name: Audit formula syntax and style
        run: brew audit --strict iso-tollgate/tollgate/iso-tollgate
