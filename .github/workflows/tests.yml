name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-formula:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Remove any stale tap from a previous run
        run: brew untap iso-tollgate/tollgate iso-tollgate/local-ci 2>/dev/null || true

      - name: Tap this repo locally
        run: brew tap iso-tollgate/local-ci "$GITHUB_WORKSPACE"

      - name: Install formula from source
        run: brew install --build-from-source iso-tollgate/local-ci/iso-tollgate

      - name: Run formula test block
        run: brew test iso-tollgate/local-ci/iso-tollgate

      - name: Audit formula
        run: brew audit --strict iso-tollgate/local-ci/iso-tollgate
