name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit-formula:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Audit formula syntax and style
        # brew audit accepts a formula file path directly -- no tap
        # registration needed, so this sidesteps every tap-naming/remote-
        # matching issue hit when trying to brew-install from a local path
        # in CI (see commit history). This catches Ruby syntax errors,
        # style violations, and metadata problems, but does NOT build or
        # run the formula -- a full `brew install --build-from-source` +
        # `brew test` pass is still required locally before merging (see
        # README.md's "Testing the formula locally" section). That full
        # install/test loop has its own real cost too: jiter and
        # pydantic_core compile Rust extensions from source every time
        # (~8-10 min), which is exactly why CI doesn't attempt it on every
        # push -- see README.md's "Known issues / future work" section.
        run: brew audit --strict --formula ./Formula/iso-tollgate.rb
