name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-formula:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap this repo locally
        run: brew tap iso-tollgate/tollgate "$GITHUB_WORKSPACE"

      - name: Install formula from source
        run: brew install --build-from-source iso-tollgate/tollgate/iso-tollgate

      - name: Run formula test block
        run: brew test iso-tollgate

      - name: Audit formula
        run: brew audit --strict iso-tollgate/tollgate/iso-tollgate
